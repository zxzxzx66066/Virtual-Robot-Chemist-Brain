<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>光电实验室 - 智能调度中枢</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        /* 极客暗黑风 UI 设计 */
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Consolas', monospace; padding: 30px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { border-bottom: 2px solid #30363d; padding-bottom: 10px; margin-bottom: 20px; }
        .header h1 { color: #58a6ff; margin: 0; font-size: 24px; }
        
        .control-panel { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 20px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; background: #010409; color: #7ee787; border: 1px solid #30363d; border-radius: 4px; font-size: 16px; font-family: inherit;}
        input:focus { outline: none; border-color: #58a6ff; }
        button { padding: 0 25px; background: #238636; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px;}
        button:hover { background: #2ea043; }
        button:disabled { background: #30363d; color: #8b949e; cursor: not-allowed; }

        /* 终端仿真界面 */
        .terminal { background: #000; border: 1px solid #30363d; border-radius: 8px; padding: 20px; height: 400px; overflow-y: auto; box-shadow: inset 0 0 10px rgba(0,0,0,0.8); }
        .log-line { margin-bottom: 10px; line-height: 1.5; font-size: 14px; border-bottom: 1px dashed #222; padding-bottom: 8px;}
        
        /* 状态颜色高亮 */
        .time { color: #8b949e; margin-right: 10px; }
        .status-pending { color: #8b949e; }
        .status-thinking { color: #d2a8ff; } /* 紫色思考 */
        .status-executing { color: #f0883e; } /* 橙色执行 */
        .status-completed { color: #3fb950; font-weight: bold; } /* 绿色完成 */
        .status-failed { color: #f85149; font-weight: bold; } /* 红色报错 */
        
        /* 模拟光标闪烁 */
        .cursor { display: inline-block; width: 8px; height: 15px; background: #7ee787; animation: blink 1s step-end infinite; vertical-align: middle; margin-left: 5px;}
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="app" class="container">
        <div class="header">
            <h1>> 自动化实验室 Agent 终端 v2.0</h1>
            <p style="color:#8b949e; font-size: 12px;">Data Source: Local Redis Cache | Core: GLM-4 LLM</p>
        </div>

        <div class="control-panel">
            <input v-model="instruction" placeholder="请输入自然语言指令 (例: 将显微镜对准单晶硅并拍摄，然后复位机械臂)" @keyup.enter="submitTask" :disabled="isPolling">
            <button @click="submitTask" :disabled="isPolling || !instruction">
                {{ isPolling ? '运行中...' : '发送指令 [Enter]' }}
            </button>
        </div>

        <div class="terminal" id="terminal-window">
            <div v-for="(log, index) in logs" :key="index" class="log-line">
                <span class="time">[{{ log.time }}]</span>
                <span :class="'status-' + log.status">> {{ log.text }}</span>
            </div>
            <div v-if="isPolling">
                <span class="time">[{{ currentTime }}]</span>
                <span class="status-executing">> 等待中枢响应</span><span class="cursor"></span>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    instruction: '',
                    logs: [{ time: new Date().toLocaleTimeString(), status: 'completed', text: '系统初始化完成，等待任务下发...' }],
                    isPolling: false,
                    pollTimer: null,
                    currentTime: new Date().toLocaleTimeString()
                }
            },
            mounted() {
                // 每秒更新当前时间，让光标处的等待更生动
                setInterval(() => { this.currentTime = new Date().toLocaleTimeString(); }, 1000);
            },
            methods: {
                addLog(status, text) {
                    this.logs.push({ time: new Date().toLocaleTimeString(), status, text });
                    // 自动滚动到最底部
                    this.$nextTick(() => {
                        const terminal = document.getElementById('terminal-window');
                        terminal.scrollTop = terminal.scrollHeight;
                    });
                },
                async submitTask() {
                    if (!this.instruction) return;
                    this.addLog('pending', `[用户发送指令] ${this.instruction}`);
                    this.isPolling = true;

                    try {
                        // 1. 调用后端下发任务接口
                        const response = await fetch('http://127.0.0.1:8000/api/v1/agent/submit', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ instruction: this.instruction })
                        });
                        const data = await response.json();
                        this.addLog('pending', `[分配取件码] 成功获取 Task ID: ${data.task_id}`);
                        
                        // 2. 开始高频轮询 Redis 状态
                        this.startPolling(data.task_id);
                    } catch (error) {
                        this.addLog('failed', `网络请求失败: ${error.message}`);
                        this.isPolling = false;
                    }
                },
                startPolling(taskId) {
                    // 每 1.5 秒去后端查一次进度
                    this.pollTimer = setInterval(async () => {
                        try {
                            const res = await fetch(`http://127.0.0.1:8000/api/v1/task/${taskId}`);
                            const taskInfo = await res.json();

                            // 避免重复打印相同的状态
                            const lastLog = this.logs[this.logs.length - 1];
                            if (!lastLog.text.includes(taskInfo.progress)) {
                                this.addLog(taskInfo.status, taskInfo.progress);
                            }

                            // 如果任务完成或失败，停止轮询
                            if (taskInfo.status === 'completed' || taskInfo.status === 'failed') {
                                clearInterval(this.pollTimer);
                                this.isPolling = false;
                                
                                // 如果完成了，把实验报告打印出来
                                if (taskInfo.result) {
                                    this.addLog('completed', `[实验报告生成] ${JSON.stringify(taskInfo.result)}`);
                                }
                            }
                        } catch (error) {
                            clearInterval(this.pollTimer);
                            this.isPolling = false;
                        }
                    }, 1500);
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
